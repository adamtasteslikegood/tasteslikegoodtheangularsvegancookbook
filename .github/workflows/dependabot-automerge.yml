name: Automerge Dependabot (patch/minor)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    # Only run for Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "::notice::Major update detected (${{ steps.metadata.outputs.update-type }}). Not auto-merging."
          exit 0

      - name: Approve patch/minor updates
        # Note: GITHUB_TOKEN approval may not satisfy branch protection rules that
        # require reviews from specific users/teams. A PAT from a dedicated bot
        # account would be needed in that case.
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          gh pr review "$PR_URL" --approve --body "Auto-approved: Dependabot ${{ steps.metadata.outputs.update-type }} update."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            if (pr.data.draft) {
              core.info("PR is draft; not enabling auto-merge.");
              return;
            }

            core.info(`Dependabot update-type: ${{ steps.metadata.outputs.update-type }}`);

            await github.graphql(`
              mutation($pullRequestId:ID!) {
                enablePullRequestAutoMerge(input:{
                  pullRequestId:$pullRequestId,
                  mergeMethod:SQUASH
                }) { pullRequest { number } }
              }`,
              { pullRequestId: pr.data.node_id }
            );

            core.info(`Enabled auto-merge (squash) for PR #${pull_number}.`);
