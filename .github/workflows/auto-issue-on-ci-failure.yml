name: 🔴 Auto-Issue on CI Failure

# Opens (or updates) a GitHub issue whenever a monitored workflow fails on
# the main or deploy-with-db branches.  If an open issue already exists for
# that workflow+branch, a comment is added instead of creating a duplicate.

on:
  workflow_run:
    workflows:
      - CI
      - Qodana
      - Google Cloud Build Gate
    branches: [main, deploy-with-db]
    types: [completed]

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  create-issue:
    # Only fire on actual failures or timeouts (not cancellations)
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'timed_out'
    runs-on: ubuntu-latest

    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const run  = context.payload.workflow_run;

            const workflowName = run.name;
            const branch       = run.head_branch;
            const sha          = run.head_sha;
            const conclusion   = run.conclusion;
            const runUrl       = run.html_url;
            const actor        = run.triggering_actor?.login ?? 'unknown';
            const event        = run.event;
            const shortSha     = sha.substring(0, 7);

            // ── Label helpers ────────────────────────────────────────────────
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                }
              }
            }

            await ensureLabel('bug',          'd73a4a', 'Something is broken');
            await ensureLabel('automated',    'e4e669', 'Automatically created by a workflow');
            await ensureLabel('CI/CD',        '0075ca', 'Continuous integration and deployment');
            await ensureLabel('code-quality', 'a2eeef', 'Code quality issues');
            await ensureLabel('deployment',   '0052cc', 'Deployment pipeline issues');

            // Per-workflow label mapping
            const workflowLabelMap = {
              'CI':                      ['CI/CD'],
              'Qodana':                  ['CI/CD', 'code-quality'],
              'Google Cloud Build Gate': ['CI/CD', 'deployment'],
            };
            const extraLabels = workflowLabelMap[workflowName] ?? ['CI/CD'];
            const allLabels   = ['bug', 'automated', ...new Set(extraLabels)];

            // ── Issue title (used for deduplication) ─────────────────────────
            const issueTitle = `🔴 CI Failure: ${workflowName} on \`${branch}\``;

            // ── Deduplication: search for existing open issue ────────────────
            const searchResp = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${issueTitle}"`,
              per_page: 5,
            });

            if (searchResp.data.total_count > 0) {
              const existing = searchResp.data.items[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: [
                  '## 🔄 Failure Recurred',
                  '',
                  '| Field | Value |',
                  '|---|---|',
                  `| **Run** | [${workflowName} #${run.run_number}](${runUrl}) |`,
                  `| **Commit** | [\`${shortSha}\`](https://github.com/${owner}/${repo}/commit/${sha}) |`,
                  `| **Triggered by** | @${actor} via \`${event}\` |`,
                  `| **Conclusion** | \`${conclusion}\` |`,
                  '',
                  '> ⚠️ This issue was still open when the next failure occurred.',
                ].join('\n'),
              });
              core.info(`Commented on existing issue #${existing.number}`);
              return;
            }

            // ── Collect failed-job details ───────────────────────────────────
            let failedJobsSection = '';
            try {
              const jobsResp  = await github.rest.actions.listJobsForWorkflowRun({
                owner, repo, run_id: run.id,
              });
              const failedJobs = jobsResp.data.jobs.filter(
                j => j.conclusion === 'failure' || j.conclusion === 'timed_out',
              );
              if (failedJobs.length > 0) {
                failedJobsSection = [
                  '',
                  '## ❌ Failed Jobs',
                  '',
                  ...failedJobs.map(j => `- ❌ **${j.name}** — [View logs](${j.html_url})`),
                ].join('\n');
              }
            } catch (e) {
              core.warning(`Could not fetch job details: ${e.message}`);
            }

            // ── Build issue body ─────────────────────────────────────────────
            const body = [
              '## 🔴 Workflow Failure Detected',
              '',
              `The **${workflowName}** workflow failed on the \`${branch}\` branch.`,
              '',
              '| Field | Value |',
              '|---|---|',
              `| **Workflow** | ${workflowName} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | [\`${shortSha}\`](https://github.com/${owner}/${repo}/commit/${sha}) |`,
              `| **Triggered by** | @${actor} via \`${event}\` |`,
              `| **Conclusion** | \`${conclusion}\` |`,
              `| **Run** | [▶ View workflow run](${runUrl}) |`,
              failedJobsSection,
              '',
              '## 🎯 Action Required',
              '',
              `Please investigate the failing checks and push a fix to \`${branch}\`.`,
              'Once all jobs pass, this issue can be closed.',
              '',
              '---',
              `> 🤖 Auto-generated by [Auto-Issue on CI Failure](https://github.com/${owner}/${repo}/blob/main/.github/workflows/auto-issue-on-ci-failure.yml)`,
            ].join('\n');

            // ── Create issue (GitHub silently drops invalid assignees) ────────
            const issue = await github.rest.issues.create({
              owner,
              repo,
              title:     issueTitle,
              body,
              labels:    allLabels,
              assignees: ['adamtasteslikegood', 'copilot'],
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
