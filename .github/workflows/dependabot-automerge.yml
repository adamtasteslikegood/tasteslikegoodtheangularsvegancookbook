name: Automerge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Automerge Dependabot PRs
        uses: dependabot/fetch-metadata@v1
        id: metadata
      - name: Check for automerge conditions
        if: steps.metadata.outputs.version-update-type != 'major'
        run: |
          echo "This PR can be merged!"
      - name: Merge PR (squash)
        if: steps.metadata.outputs.version-update-type != 'major' && github.event.pull_request.head.sha == github.sha
        uses: actions/github-script@v5
        with:
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            });
