name: Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Feature work is PR'd into dev first (see CLAUDE.md branching strategy), so
    # reviewing only main-targeted PRs meant Junie never saw day-to-day PRs.
    branches: [main, dev]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run advisory Junie review
        continue-on-error: true
        uses: JetBrains/junie-github-action@9605a68b1038edb2e33071ca799681ab24ff75ba # v1.5.10
        with:
          # KNOWN-BROKEN UPSTREAM (2026-07-20, TAS-2900): every run dies at
          # "Failed to build 'issue.md.junie_standalone'". Reproduced across Junie
          # CLI 2285.4/2285.5, junie_api_key vs BYOK google_api_key, every model,
          # AND both the built-in `code-review` prompt and a custom prompt — so it
          # is a JetBrains Junie Review-mode bug, NOT a config problem here. No
          # workflow-file change fixes it. Kept advisory (continue-on-error) so it
          # auto-recovers once JetBrains ships a fix; the repo's "Independent
          # Claude review" workflow covers PR review in the meantime.
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          use_single_comment: 'true'
          prompt: 'code-review'
