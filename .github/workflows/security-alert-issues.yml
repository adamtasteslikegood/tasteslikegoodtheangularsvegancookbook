name: Security Alert → GitHub Issue

# Creates a GitHub issue whenever a high- or critical-severity code-scanning
# alert is opened.  A weekly job also back-fills any existing open alerts that
# do not yet have a corresponding issue (deduplication by alert number in title).

on:
  # Fires whenever CodeQL (or another code-scanning tool) creates or reopens an alert.
  code_scanning_alert:
    types: [created, reopened]

  # Weekly back-fill: Monday 07:10 UTC (10 min after the CodeQL weekly scan at 06:00).
  schedule:
    - cron: '10 7 * * 1'

  # Allow a maintainer to trigger the back-fill manually and optionally dry-run it.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list alerts but do NOT create issues'
        type: boolean
        default: false

permissions:
  issues: write
  security-events: read

jobs:
  # ── Job 1: Ensure the required labels exist (shared prerequisite) ─────────────
  ensure-labels:
    name: Ensure labels exist
    runs-on: ubuntu-latest
    steps:
      - name: Create missing labels
        uses: actions/github-script@v7
        with:
          script: |
            const defs = [
              { name: 'security',           color: 'd73a4a', description: 'Security concern' },
              { name: 'code-scanning',      color: 'e4e669', description: 'Code-scanning alert' },
              { name: 'severity: critical', color: 'b60205', description: 'Critical severity' },
              { name: 'severity: high',     color: 'e11d48', description: 'High severity' },
              { name: 'severity: error',    color: 'ff6b6b', description: 'Error-level rule severity' },
            ];
            for (const def of defs) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  def.name,
                });
              } catch (err) {
                // Only create the label when it is genuinely missing (404).
                // Re-throw anything else (5xx, auth errors) so failures are visible.
                if (err.status !== 404) throw err;
                await github.rest.issues.createLabel({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  name:        def.name,
                  color:       def.color,
                  description: def.description,
                });
              }
            }

  # ── Job 2: New / reopened alert ──────────────────────────────────────────────
  on-new-alert:
    name: Create issue for new alert
    needs: ensure-labels
    if: github.event_name == 'code_scanning_alert'
    runs-on: ubuntu-latest

    steps:
      # Decide whether this alert's severity warrants an issue.
      # security_severity_level: critical | high | medium | low
      # rule.severity:           error | warning | note | none
      - name: Evaluate severity
        id: sev
        env:
          SEC_LEVEL: ${{ github.event.alert.rule.security_severity_level }}
          RULE_SEV: ${{ github.event.alert.rule.severity }}
        run: |
          if [[ "$SEC_LEVEL" == "critical" || "$SEC_LEVEL" == "high" || "$RULE_SEV" == "error" ]]; then
            echo "create=true"  >> "$GITHUB_OUTPUT"
            echo "level=${SEC_LEVEL:-$RULE_SEV}" >> "$GITHUB_OUTPUT"
          else
            echo "create=false" >> "$GITHUB_OUTPUT"
          fi

      # Guard against duplicates (e.g. the alert was dismissed then reopened).
      # Cap at MAX_DEDUP_PAGES to stay well within API rate limits.
      # 10 pages × 100 issues/page = 1,000 issues searched, sufficient for this repo.
      - name: Check for duplicate issue
        if: steps.sev.outputs.create == 'true'
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const alertNumber = context.payload.alert.number;
            const MAX_DEDUP_PAGES = 10;
            for (let page = 1; page <= MAX_DEDUP_PAGES; page++) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                labels:   'code-scanning',
                state:    'all',
                per_page: 100,
                page,
              });
              if (issues.length === 0) break;
              if (issues.some(i => i.title.includes(`(Alert #${alertNumber})`))) {
                core.setOutput('exists', 'true');
                return;
              }
              if (issues.length < 100) break;
            }
            core.setOutput('exists', 'false');

      - name: Create issue
        if: steps.sev.outputs.create == 'true' && steps.dedup.outputs.exists == 'false'
        uses: actions/github-script@v7
        env:
          ALERT_LEVEL: ${{ steps.sev.outputs.level }}
        with:
          script: |
            // ── Helpers ────────────────────────────────────────────────────────
            // Note: actions/github-script steps run in isolated VM contexts per job,
            // so these helpers are repeated in the backfill job. A composite action
            // would be the DRY alternative but adds meaningful structural complexity.
            function severityEmoji(level) {
              if (level === 'critical') return '🔴';
              if (level === 'high')     return '🟠';
              return '🟡';
            }

            function severityLabels(level) {
              const base = ['security', 'code-scanning'];
              if      (level === 'critical') base.push('severity: critical');
              else if (level === 'high')     base.push('severity: high');
              else                           base.push('severity: error');
              return base;
            }

            function issueBody({ alert, level, fileLine, ref }) {
              const emoji = severityEmoji(level);
              return [
                `## ${emoji} Code-Scanning Security Alert`,
                '',
                '| Field | Value |',
                '|-------|-------|',
                `| **Alert #** | [#${alert.number}](${alert.html_url}) |`,
                `| **Rule ID** | \`${alert.rule.id}\` |`,
                `| **Rule name** | ${alert.rule.name} |`,
                `| **Severity** | \`${level}\` |`,
                `| **Location** | ${fileLine} |`,
                `| **Branch** | \`${ref}\` |`,
                '',
                '### Description',
                alert.rule.description || '_No description provided._',
                '',
                '### Next steps',
                `1. Open the [alert in the Security tab](${alert.html_url}) and review the finding.`,
                '2. Apply the suggested fix, or dismiss the alert with a written justification.',
                '3. Close this issue once the alert is resolved or dismissed.',
                '',
                '---',
                '_Automatically opened by the **Security Alert → GitHub Issue** workflow._',
              ].join('\n');
            }

            // ── Main ───────────────────────────────────────────────────────────
            const alert = context.payload.alert;
            const level = process.env.ALERT_LEVEL;
            const emoji = severityEmoji(level);
            const ref   = context.payload.ref || 'unknown';

            const loc = alert.most_recent_instance?.location;
            const fileLine = loc
              ? `[\`${loc.path}\` line ${loc.start_line}](${alert.html_url})`
              : '_unknown_';

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `${emoji} [Security] ${alert.rule.name} (Alert #${alert.number})`,
              labels: severityLabels(level),
              body:   issueBody({ alert, level, fileLine, ref }),
            });

  # ── Job 3: Weekly back-fill of existing open alerts ──────────────────────────
  backfill:
    name: Back-fill existing open alerts
    needs: ensure-labels
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Back-fill open high/critical/error alerts
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          script: |
            // ── Helpers ────────────────────────────────────────────────────────
            function severityEmoji(level) {
              if (level === 'critical') return '🔴';
              if (level === 'high')     return '🟠';
              return '🟡';
            }

            function severityLabels(level) {
              const base = ['security', 'code-scanning'];
              if      (level === 'critical') base.push('severity: critical');
              else if (level === 'high')     base.push('severity: high');
              else                           base.push('severity: error');
              return base;
            }

            function issueBody({ alert, level, fileLine, ref }) {
              const emoji = severityEmoji(level);
              return [
                `## ${emoji} Code-Scanning Security Alert`,
                '',
                '| Field | Value |',
                '|-------|-------|',
                `| **Alert #** | [#${alert.number}](${alert.html_url}) |`,
                `| **Rule ID** | \`${alert.rule.id}\` |`,
                `| **Rule name** | ${alert.rule.name} |`,
                `| **Severity** | \`${level}\` |`,
                `| **Location** | ${fileLine} |`,
                `| **Branch** | \`${ref}\` |`,
                '',
                '### Description',
                alert.rule.description || '_No description provided._',
                '',
                '### Next steps',
                `1. Open the [alert in the Security tab](${alert.html_url}) and review the finding.`,
                '2. Apply the suggested fix, or dismiss the alert with a written justification.',
                '3. Close this issue once the alert is resolved or dismissed.',
                '',
                '---',
                '_Automatically opened by the **Security Alert → GitHub Issue** workflow._',
              ].join('\n');
            }

            // ── Main ───────────────────────────────────────────────────────────
            const dryRun = process.env.DRY_RUN === 'true';
            // 10 pages × 100 issues/page = 1,000 issues searched, sufficient for this repo.
            const MAX_DEDUP_PAGES = 10;

            // Collect alert numbers that already have an issue (bounded pagination).
            const existing = new Set();
            for (let page = 1; page <= MAX_DEDUP_PAGES; page++) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                labels:   'code-scanning',
                state:    'all',
                per_page: 100,
                page,
              });
              if (issues.length === 0) break;
              for (const issue of issues) {
                const m = issue.title.match(/\(Alert #(\d+)\)/);
                if (m) existing.add(parseInt(m[1], 10));
              }
              if (issues.length < 100) break;
            }
            console.log(`Existing code-scanning issue(s): ${existing.size}`);

            // Fetch ALL open alerts without a severity filter, then apply the same
            // predicate as the on-new-alert job client-side.
            // Rationale: the API's `severity` filter maps to `security_severity_level`
            // (CVSS-based) and does not understand `rule.severity = 'error'`, so
            // passing 'error' there would return 0 results.
            let created = 0;
            let skipped = 0;
            let alertPage = 1;

            while (true) {
              let alerts;
              try {
                ({ data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
                  owner:    context.repo.owner,
                  repo:     context.repo.repo,
                  state:    'open',
                  per_page: 100,
                  page:     alertPage,
                }));
              } catch (err) {
                // Code scanning may not be enabled or accessible — skip gracefully.
                console.error(`Could not list alerts: ${err.message}`);
                break;
              }

              if (alerts.length === 0) break;

              for (const alert of alerts) {
                // Match on-new-alert predicate: critical/high CVSS OR error rule severity.
                const secLevel = alert.rule.security_severity_level;
                const ruleSev  = alert.rule.severity;
                if (!['critical', 'high'].includes(secLevel) && ruleSev !== 'error') continue;

                if (existing.has(alert.number)) {
                  console.log(`Skip Alert #${alert.number} — issue already exists.`);
                  skipped++;
                  continue;
                }

                const level = secLevel || ruleSev;
                const emoji = severityEmoji(level);
                const title = `${emoji} [Security] ${alert.rule.name} (Alert #${alert.number})`;

                if (dryRun) {
                  console.log(`[DRY RUN] Would create: ${title}`);
                  existing.add(alert.number);
                  continue;
                }

                const loc = alert.most_recent_instance?.location;
                const fileLine = loc
                  ? `[\`${loc.path}\` line ${loc.start_line}](${alert.html_url})`
                  : '_unknown_';
                const ref = alert.most_recent_instance?.ref || 'unknown';

                await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title,
                  labels: severityLabels(level),
                  body:   issueBody({ alert, level, fileLine, ref }),
                });

                existing.add(alert.number);
                created++;
                console.log(`Created issue for Alert #${alert.number}: ${title}`);

                // 500 ms between creates to stay under GitHub's secondary rate limit
                // (GitHub enforces ~1 issue/second for mutation requests).
                await new Promise(r => setTimeout(r, 500));
              }

              if (alerts.length < 100) break;
              alertPage++;
            }

            console.log(`\nSummary: ${created} issue(s) created, ${skipped} skipped (duplicates).`);
