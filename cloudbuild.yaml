# Cloud Build pipeline for building and deploying to Cloud Run.
substitutions:
  _REGION: us-central1
  _EXPRESS_SERVICE: express-frontend
  _FLASK_SERVICE: flask-backend
  _MIGRATION_JOB: db-migration-job
  _IMAGE_REGISTRY: gcr.io/$PROJECT_ID/vegangenius

steps:
  # 1. Build the Express frontend image
  - name: gcr.io/cloud-builders/docker
    id: 'Build Express Frontend'
    args: 
      - build
      - -t
      - $_IMAGE_REGISTRY/express-frontend:$SHORT_SHA
      - .

  # 2. Build the Flask backend image
  - name: gcr.io/cloud-builders/docker
    id: 'Build Flask Backend'
    dir: 'Backend'
    args: 
      - build
      - -t
      - $_IMAGE_REGISTRY/flask-backend:$SHORT_SHA
      - .

  # 3. Build the database migration image
  - name: gcr.io/cloud-builders/docker
    id: 'Build Migration Task'
    dir: 'Backend'
    args: 
      - build
      - -t
      - $_IMAGE_REGISTRY/migration-task:$SHORT_SHA
      - -f
      - Dockerfile.migrate
      - .

  # 4. Push all images to Container Registry
  - name: gcr.io/cloud-builders/docker
    id: 'Push Express Frontend Image'
    args: [push, '$_IMAGE_REGISTRY/express-frontend:$SHORT_SHA']
    
  - name: gcr.io/cloud-builders/docker
    id: 'Push Flask Backend Image'
    args: [push, '$_IMAGE_REGISTRY/flask-backend:$SHORT_SHA']
    
  - name: gcr.io/cloud-builders/docker
    id: 'Push Migration Task Image'
    args: [push, '$_IMAGE_REGISTRY/migration-task:$SHORT_SHA']

  # 5. Update Migration Job to use new image
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: 'Update Migration Job'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - $_MIGRATION_JOB
      - --image=$_IMAGE_REGISTRY/migration-task:$SHORT_SHA
      - --region=$_REGION
      
  # 6. Execute Migration Job and wait for success
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: 'Execute Migration Job'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - $_MIGRATION_JOB
      - --region=$_REGION
      - --wait

  # 7. Deploy Flask Backend
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: 'Deploy Flask Backend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FLASK_SERVICE
      - --image=$_IMAGE_REGISTRY/flask-backend:$SHORT_SHA
      - --region=$_REGION
      - --min-instances=1
      - --quiet

  # 8. Deploy Express Frontend
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: 'Deploy Express Frontend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_EXPRESS_SERVICE
      - --image=$_IMAGE_REGISTRY/express-frontend:$SHORT_SHA
      - --region=$_REGION
      - --quiet

images:
  - $_IMAGE_REGISTRY/express-frontend:$SHORT_SHA
  - $_IMAGE_REGISTRY/flask-backend:$SHORT_SHA
  - $_IMAGE_REGISTRY/migration-task:$SHORT_SHA
