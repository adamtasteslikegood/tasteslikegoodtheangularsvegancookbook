version: 2

updates:
  # -------------------------
  # GitHub Actions
  # -------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 25

  # -------------------------
  # npm (root)
  # -------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 25

  # -------------------------
  # Docker (root)
  # -------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 25
