name: Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Feature work is PR'd into dev first (see CLAUDE.md branching strategy), so
    # reviewing only main-targeted PRs meant Junie never saw day-to-day PRs.
    branches: [main, dev]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run advisory Junie review
        continue-on-error: true
        uses: JetBrains/junie-github-action@9605a68b1038edb2e33071ca799681ab24ff75ba # v1.5.10
        with:
          # The built-in `prompt: code-review` dies upstream at "Failed to build
          # 'issue.md.junie_standalone'" (a JetBrains Review-mode bug, reproduced
          # across CLI 2285.4/2285.5, junie_api_key vs BYOK, and every model).
          # Use a custom prompt (cookbook "Option B") — a different code path that
          # skips the broken built-in template.
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          use_single_comment: 'true'
          prompt: |
            Your task is to:
            1. Get the Pull Request diff with `git diff origin/${{ github.event.pull_request.base.ref }}...`
            2. Review the diff against the criteria below.
            3. Post a concise summary using the `submit` action.

            ## Review Criteria
            - **Correctness & bugs:** logic errors, edge cases, error handling.
            - **Security:** injection, XSS, exposed secrets, auth/authorization, input validation.
            - **Performance:** N+1 queries, inefficient algorithms, memory leaks.
            - **Maintainability:** clarity, naming, duplication, and consistency with the
              surrounding code and this repo's CLAUDE.md conventions.

            Be specific and reference file:line. If the diff looks good, say so briefly.
