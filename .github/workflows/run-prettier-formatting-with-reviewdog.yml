name: Prettier (reviewdog)

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  pull_request:
    branches: [main, develop]

jobs:
  prettier-review:
    name: Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier with reviewdog
        # v1.3.0 — pinned to commit for supply-chain safety
        uses: EPMatt/reviewdog-action-prettier@f691104cbeb4b0299df971275444c64be93c03ae
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: error
          reporter: github-pr-review
          filter_mode: file
          fail_level: error
          # Uses default prettier_flags: '.' — .prettierrc and .prettierignore handle scoping

