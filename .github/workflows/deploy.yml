name: Deploy

on:
  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - express-frontend
          - flask-backend

  # Auto-deploy on merge to main (after CI passes)
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: comdottasteslikegood
  REGION: us-central1
  IMAGE_REGISTRY: us-central1-docker.pkg.dev/comdottasteslikegood/vegangenius

jobs:
  ci:
    name: CI Check
    if: github.event_name == 'push'
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine services to deploy
        id: services
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.service }}" >> $GITHUB_OUTPUT
          else
            echo "target=both" >> $GITHUB_OUTPUT
          fi

      - name: Submit Cloud Build
        if: steps.services.outputs.target == 'both'
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=SHORT_SHA=${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Deploy Express Frontend only
        if: steps.services.outputs.target == 'express-frontend'
        run: |
          gcloud builds submit \
            --tag ${{ env.IMAGE_REGISTRY }}/express-frontend:${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} --quiet
          gcloud run deploy express-frontend \
            --image=${{ env.IMAGE_REGISTRY }}/express-frontend:${{ github.sha }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Deploy Flask Backend only
        if: steps.services.outputs.target == 'flask-backend'
        run: |
          gcloud builds submit \
            --tag ${{ env.IMAGE_REGISTRY }}/flask-backend:${{ github.sha }} \
            --project=${{ env.PROJECT_ID }} --quiet \
            --dir=Backend
          gcloud run deploy flask-backend \
            --image=${{ env.IMAGE_REGISTRY }}/flask-backend:${{ github.sha }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --quiet
