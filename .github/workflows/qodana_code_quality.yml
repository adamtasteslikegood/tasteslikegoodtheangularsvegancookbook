name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - deploy-with-db
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    env:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1818970254 }}
    steps:
      - name: Skip when token is unavailable
        if: ${{ env.QODANA_TOKEN == '' }}
        run: echo "::notice::QODANA_TOKEN is not available (expected for dependabot or fork PRs). Skipping Qodana scan."

      - uses: actions/checkout@v6
        if: ${{ env.QODANA_TOKEN != '' }}
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        if: ${{ env.QODANA_TOKEN != '' }}
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_ENDPOINT: 'https://qodana.cloud'
