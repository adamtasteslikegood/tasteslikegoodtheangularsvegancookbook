name: CI/CD - Maximized Baseline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Concurrency group to cancel obsolete runs on PRs, saving Action minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. FRONTEND: Code Quality & Security (Runs fast, fails fast)
  frontend-quality:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Prettier Format Check
        run: npm run format:check
      - name: TypeScript Type Check
        run: npm run type-check

  # 2. FRONTEND: Testing (Runs in parallel with Quality)
  frontend-test:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests with Coverage
        run: npm run test:ci
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # 3. BACKEND: Quality & Testing (Parallelized)
  backend-checks:
    name: Backend Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install UV for Fast Python Management
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Dependencies
        working-directory: Backend
        run: uv sync --dev
      - name: Run Flake8 / Ruff
        working-directory: Backend
        run: uv run ruff check .
      - name: Run Pytest
        working-directory: Backend
        run: uv run pytest --cov=. --cov-report=xml
      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Backend/coverage.xml
          retention-days: 7

  # 4. BUILD & PACKAGE: Only runs if all Quality/Tests pass
  build:
    name: Build Production Assets
    needs: [frontend-quality, frontend-test, backend-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Application
        run: npm run build
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            dist/
            server/dist/
          retention-days: 7

  # 5. DEPLOYMENT (Staging / Production)
  # Only triggers on push to main (not PRs)
  deploy-cloud-run:
    name: Deploy to Google Cloud Run
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Google Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
      - name: Submit Cloud Build (Deploy)
        run: |
          gcloud builds submit . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --config cloudbuild.yaml \
            --substitutions="_REGION=${{ vars.GCP_REGION }},_SERVICE=${{ vars.CLOUD_RUN_SERVICE }}"
