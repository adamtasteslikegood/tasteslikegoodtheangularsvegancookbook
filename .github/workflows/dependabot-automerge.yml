name: Automerge Dependabot (patch/minor)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    # Only run for Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        # Only for patch/minor updates. Queues auto-merge; GitHub merges once checks pass.
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            // Safety: don't auto-merge draft PRs
            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            if (pr.data.draft) {
              core.info("PR is draft; not enabling auto-merge.");
              return;
            }

            core.info(`Dependabot update-type: ${{ steps.metadata.outputs.update-type }}`);

            // Enable auto-merge using squash
            // (If auto-merge is disabled at the repo level, this call will fail.)
            await github.graphql(`
              mutation($pullRequestId:ID!) {
                enablePullRequestAutoMerge(input:{
                  pullRequestId:$pullRequestId,
                  mergeMethod:SQUASH
                }) { pullRequest { number } }
              }`,
              { pullRequestId: pr.data.node_id }
            );

            core.info(`Enabled auto-merge (squash) for PR #${pull_number}.`);
