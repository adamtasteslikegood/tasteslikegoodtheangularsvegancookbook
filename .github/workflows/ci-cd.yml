name: CI/CD — Angular → express-frontend

# Deploy policy (enforced by version-gate job):
#   minor/major bump (patch == 0)  →  deploy always; ci-cd-backend.yml triggers
#                                     on the same tag and also deploys, so both
#                                     services are updated in the same release.
#   patch bump (patch > 0)         →  deploy only if frontend files changed
#                                     since the previous release tag.
#   main branch push (no tag)      →  always deploy (continuous deployment).
#
# Image traceability:
#   Every build is tagged with the SemVer, SemVer+SHA, full git SHA, and latest.
#   OCI labels embed version, commit, build date, and run number.
#   Cloud Run revision suffix encodes version + short SHA so each revision
#   maps 1:1 to the exact code deployed:
#     express-frontend-00042-1-2-3-shabc1234

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: express-frontend
  IMAGE: gcr.io/comdottasteslikegood/express-frontend

jobs:
  # ── 0. Version gate ──────────────────────────────────────────────────────
  # Outputs used by build and deploy jobs:
  #   semver_tag       — e.g., v1.2.3
  #   short_sha        — first 7 chars of GITHUB_SHA
  #   revision_suffix  — Cloud Run revision suffix, e.g., 1-2-3-shabc1234
  #   should_deploy    — true/false per policy above

  version-gate:
    name: Version gate
    runs-on: ubuntu-latest
    outputs:
      semver_tag:      ${{ steps.gate.outputs.semver_tag }}
      short_sha:       ${{ steps.gate.outputs.short_sha }}
      revision_suffix: ${{ steps.gate.outputs.revision_suffix }}
      should_deploy:   ${{ steps.gate.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to locate previous tag

      - name: Compute version metadata and deploy gate
        id: gate
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SEMVER_TAG="${GITHUB_REF_NAME}"
            PATCH=$(echo "${SEMVER_TAG#v}" | cut -d. -f3 | cut -d- -f1 | cut -d+ -f1)

            if [ "$PATCH" = "0" ]; then
              # Minor or major bump — both services must deploy; always proceed
              SHOULD_DEPLOY=true
              echo "Bump type: minor/major — deploying unconditionally"
            else
              # Patch bump — only deploy if frontend-relevant files changed
              PREV_TAG=$(git tag --sort=-version:refname \
                | grep -v "^${SEMVER_TAG}$" | head -1 || true)
              if [ -z "$PREV_TAG" ]; then
                SHOULD_DEPLOY=true
                echo "No previous tag found — first release, deploying"
              else
                CHANGED=$(git diff --name-only "$PREV_TAG" "${SEMVER_TAG}" -- \
                  src/ server/ Dockerfile package.json package-lock.json \
                  angular.json tsconfig.json 'tsconfig.*.json' \
                  | wc -l | tr -d ' ')
                SHOULD_DEPLOY=$([ "$CHANGED" -gt 0 ] && echo "true" || echo "false")
                echo "Patch bump: ${CHANGED} frontend file(s) changed vs ${PREV_TAG} → should_deploy=${SHOULD_DEPLOY}"
              fi
            fi
          else
            # Non-tag push to main — continuous deployment
            SEMVER_TAG="v$(python3 -c "import json; print(json.load(open('package.json'))['version'])")"
            SHOULD_DEPLOY=true
            echo "Branch push — deploying continuously"
          fi

          # Cloud Run revision suffix rules: lowercase alphanumeric + hyphens, ≤ 63 chars
          # Format: {major}-{minor}-{patch}-sha{short_sha}  →  1-2-3-shabc1234
          VERSION_SLUG=$(echo "${SEMVER_TAG#v}" | tr '.' '-' | tr '+' '-')
          REVISION_SUFFIX="${VERSION_SLUG}-sha${SHORT_SHA}"

          echo "semver_tag=${SEMVER_TAG}"           >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"             >> "$GITHUB_OUTPUT"
          echo "revision_suffix=${REVISION_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "should_deploy=${SHOULD_DEPLOY}"     >> "$GITHUB_OUTPUT"

          echo "→ semver_tag=${SEMVER_TAG}  revision_suffix=${REVISION_SUFFIX}"

  # ── 1. GCP auth gate ─────────────────────────────────────────────────────
  # Fail-fast: if GCP credentials are broken, stop before spending
  # compute on install / test / build.

  activation:
    name: Authenticate with GCP
    runs-on: ubuntu-latest
    needs: [version-gate]
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ secrets.GCP_PROJECT_ID }}'

  # ── 2. Install dependencies ───────────────────────────────────────────────

  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    needs: [version-gate]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

  # ── 3. Lint & Test ────────────────────────────────────────────────────────

  test:
    name: Lint & test (Vitest)
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
      - run: npm run lint
      - run: npm run test:ci   # Vitest with coverage thresholds

  # ── 4. Build Docker image ─────────────────────────────────────────────────
  # Skipped on pull requests.
  #
  # Tags pushed to GCR:
  #   :v1.2.3                 — canonical SemVer
  #   :v1.2.3-sha.abc1234     — SemVer + short SHA (informational)
  #   :<full-git-sha>         — exact commit (used by deploy step)
  #   :latest

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [activation, test, version-gate]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
      - run: npx ng build --configuration=production

      - name: Authenticate for Docker push
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'
      - run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push (with OCI labels + all tags)
        env:
          SEMVER_TAG: ${{ needs.version-gate.outputs.semver_tag }}
          SHORT_SHA:  ${{ needs.version-gate.outputs.short_sha }}
        run: |
          BUILD_TAG="${SEMVER_TAG}-sha.${SHORT_SHA}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          docker build \
            --label "org.opencontainers.image.version=${SEMVER_TAG#v}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=${BUILD_DATE}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "com.tasteslikegood.build-run=${GITHUB_RUN_NUMBER}" \
            --label "com.tasteslikegood.service=express-frontend" \
            --tag "${IMAGE}:${SEMVER_TAG}" \
            --tag "${IMAGE}:${BUILD_TAG}" \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:latest" \
            .

          docker push "${IMAGE}:${SEMVER_TAG}"
          docker push "${IMAGE}:${BUILD_TAG}"
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

          echo "Pushed:"
          echo "  ${IMAGE}:${SEMVER_TAG}"
          echo "  ${IMAGE}:${BUILD_TAG} (informational)"
          echo "  ${IMAGE}:${GITHUB_SHA} (used for deploy)"
          echo "  ${IMAGE}:latest"

  # ── 5. Deploy to Cloud Run ────────────────────────────────────────────────
  # Uses gcloud run deploy directly (not the GitHub Action wrapper) so we can
  # set --revision-suffix for full Cloud Run revision traceability.
  #
  # Resulting revision name example:
  #   express-frontend-00042-1-2-3-shabc1234
  #                            └ version  └ short SHA

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [activation, build, version-gate]
    if: |
      github.event_name != 'pull_request' &&
      needs.version-gate.outputs.should_deploy == 'true' &&
      (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )

    steps:
      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_CREDENTIALS }}'

      - name: Deploy express-frontend
        env:
          SEMVER_TAG:      ${{ needs.version-gate.outputs.semver_tag }}
          SHORT_SHA:       ${{ needs.version-gate.outputs.short_sha }}
          REVISION_SUFFIX: ${{ needs.version-gate.outputs.revision_suffix }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --revision-suffix "${REVISION_SUFFIX}" \
            --platform managed \
            --quiet

          echo "✅ Deployed ${SERVICE}"
          echo "   Revision : ${SERVICE}-${REVISION_SUFFIX}"
          echo "   SemVer   : ${SEMVER_TAG}"
          echo "   Image    : ${IMAGE}:${GITHUB_SHA}"
