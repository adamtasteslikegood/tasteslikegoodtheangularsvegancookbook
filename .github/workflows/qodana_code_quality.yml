name: Qodana

# DISABLED: qodana runs with pr-mode: false and fails on pre-existing
# code-quality debt across the whole repo, so it red-X's every PR
# regardless of what the PR changed. Re-enable the push / pull_request
# triggers once the scan can pass (e.g. with pr-mode: true, a baseline,
# or after the backlog is cleared). Manual runs via workflow_dispatch
# are still available for testing.
on:
  workflow_dispatch:

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    env:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1818970254 }}
    steps:
      - name: Skip when token is unavailable
        if: ${{ env.QODANA_TOKEN == '' }}
        run: echo "::notice::QODANA_TOKEN is not available (expected for dependabot or fork PRs). Skipping Qodana scan."

      - uses: actions/checkout@v6
        if: ${{ env.QODANA_TOKEN != '' }}
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        if: ${{ env.QODANA_TOKEN != '' }}
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_ENDPOINT: 'https://qodana.cloud'
