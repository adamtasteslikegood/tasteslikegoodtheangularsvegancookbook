<div class="max-w-6xl mx-auto p-4 md:p-8 relative min-h-screen flex flex-col">
  <app-header (logoutRequested)="onLogout()" (authModalRequested)="openAuthModal()" />

  <!-- GENERATOR VIEW -->
  @if (activeView() === 'generator') {
    <app-generator
      (addToCookbookRequested)="openAddToCookbookModal($event)"
      (authModalRequested)="openAuthModal()"
    />
  }

  <!-- MY KITCHEN VIEW -->
  @if (activeView() === 'kitchen') {
    <app-kitchen
      (createCookbookRequested)="openCreateCookbookModal()"
      (manualEntryRequested)="openManualEntryModal()"
      (addToCookbookRequested)="openAddToCookbookModal($event)"
    />
  }

  <!-- Recipe Detail — rendered by router-outlet for /recipe/:id -->
  <router-outlet />

  <app-auth-modal [(isOpen)]="showAuthModal" />

  <app-create-cookbook-modal
    [(isOpen)]="showCreateCookbookModal"
    (cookbookCreated)="onCookbookCreated($event)"
  />

  <app-manual-entry-modal [(isOpen)]="showManualEntryModal" />

  <app-add-to-cookbook-modal
    [(isOpen)]="showAddToCookbookModal"
    (createCookbookRequested)="openCreateCookbookFromAddFlow()"
  />

  <app-footer />

  <app-save-toast (viewRecipeRequested)="viewRecipe($event)" />
</div>
